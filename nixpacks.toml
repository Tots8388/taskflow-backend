[phases.setup]
nixPkgs = ["python311", "pkg-config", "mysqlclient"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
    "python manage.py collectstatic --noinput",
    "python manage.py migrate --noinput"
]

[start]
cmd = "gunicorn backend.wsgi --bind 0.0.0.0:$PORT --workers 3 --timeout 120 --access-logfile - --log-level info"